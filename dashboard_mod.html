<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DA Intelligence Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
<!-- Leaflet.js -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  /* ════════════════════════════════════════
     CSS 변수 — 다크 (기본)
  ════════════════════════════════════════ */
  :root {
    --bg-primary:    #0f1117;
    --bg-secondary:  #1a1d27;
    --bg-card:       #1e2130;
    --bg-hover:      #252840;
    --accent-blue:   #4f8ef7;
    --accent-teal:   #2dd4bf;
    --accent-red:    #f87171;
    --accent-orange: #fb923c;
    --accent-yellow: #fbbf24;
    --accent-green:  #34d399;
    --text-primary:  #e2e8f0;
    --text-secondary:#94a3b8;
    --text-muted:    #64748b;
    --border:        #2d3148;
    --header-bg:     #1a1d27;
    --header-border: #2d3148;
    --map-tile-filter: brightness(0.45) saturate(0.5) hue-rotate(190deg);
    --drawer-bg:     #1e2130;
    --drawer-text:   #e2e8f0;
    --drawer-subtext:#94a3b8;
    --drawer-item-hover: #252840;
    --drawer-item-active-bg: rgba(79,142,247,.15);
    --drawer-item-active-text: #93c5fd;
    --drawer-border: #2d3148;
    --drawer-section-color: #64748b;
  }

  /* CSS 변수 — 라이트 모드 */
  body.light {
    --bg-primary:    #f1f5f9;
    --bg-secondary:  #ffffff;
    --bg-card:       #f8fafc;
    --bg-hover:      #eff6ff;
    --text-primary:  #1e293b;
    --text-secondary:#475569;
    --text-muted:    #94a3b8;
    --border:        #e2e8f0;
    --header-bg:     #0033A0;
    --header-border: #0033A0;
    --map-tile-filter: brightness(1) saturate(1) hue-rotate(0deg);
    --drawer-bg:     #ffffff;
    --drawer-text:   #1e293b;
    --drawer-subtext:#64748b;
    --drawer-item-hover: #f1f5f9;
    --drawer-item-active-bg: #eff6ff;
    --drawer-item-active-text: #0033A0;
    --drawer-border: #e2e8f0;
    --drawer-section-color: #94a3b8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Pretendard', 'Apple SD Gothic Neo', -apple-system, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background .25s, color .25s;
  }

  /* ══════════════════════════════════════
     Header
  ══════════════════════════════════════ */
  .dash-header {
    background: var(--header-bg);
    border-bottom: 1px solid var(--header-border);
    padding: 0 16px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 1000;
    transition: background .25s, border-color .25s;
  }

  /* 로고 영역 */
  .header-left { display: flex; align-items: center; gap: 10px; }

  .hamburger-btn {
    display: flex; align-items: center; justify-content: center;
    width: 34px; height: 34px; border-radius: 6px;
    background: transparent; border: none; cursor: pointer;
    color: var(--text-secondary);
    transition: background .15s, color .15s;
    flex-shrink: 0;
  }
  .hamburger-btn:hover { background: rgba(255,255,255,.08); color: var(--text-primary); }
  body.light .hamburger-btn { color: rgba(255,255,255,.7); }
  body.light .hamburger-btn:hover { background: rgba(255,255,255,.15); color: #fff; }

  .logo-wrap {
    display: flex; align-items: center; gap: 8px;
    text-decoration: none;
  }
  .logo-box {
    background: var(--accent-blue);
    color: #fff;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 10px; font-weight: 900;
    letter-spacing: .05em;
    flex-shrink: 0;
  }
  body.light .logo-box { background: #fff; color: #0033A0; }

  .logo-title {
    font-size: 13px; font-weight: 700;
    color: var(--text-primary);
    letter-spacing: .03em;
    white-space: nowrap;
  }
  body.light .logo-title { color: #fff; }

  /* 헤더 우측 */
  .header-right { display: flex; align-items: center; gap: 8px; }

  .stats-strip { display: flex; align-items: center; gap: 6px; }
  .stat-pill {
    display: flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 4px;
    background: var(--bg-card); border: 1px solid var(--border);
    font-size: 10px; color: var(--text-muted);
    transition: background .25s, border-color .25s;
  }
  .stat-pill b { color: var(--text-primary); font-weight: 600; }
  body.light .stat-pill { background: rgba(255,255,255,.15); border-color: rgba(255,255,255,.2); color: rgba(255,255,255,.7); }
  body.light .stat-pill b { color: #fff; }

  .back-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 6px;
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-secondary); font-size: 11px; font-weight: 600;
    cursor: pointer; text-decoration: none; transition: all .2s;
    white-space: nowrap;
  }
  .back-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
  body.light .back-btn { background: rgba(255,255,255,.15); border-color: rgba(255,255,255,.25); color: rgba(255,255,255,.85); }
  body.light .back-btn:hover { background: rgba(255,255,255,.25); color: #fff; }

  /* 다크/라이트 토글 버튼 */
  .theme-btn {
    display: flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: 6px;
    background: transparent; border: 1px solid var(--border);
    color: var(--text-secondary); cursor: pointer;
    transition: all .15s; font-size: 14px;
    flex-shrink: 0;
  }
  .theme-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--accent-blue); }
  body.light .theme-btn { border-color: rgba(255,255,255,.3); color: rgba(255,255,255,.8); }
  body.light .theme-btn:hover { background: rgba(255,255,255,.15); color: #fff; border-color: rgba(255,255,255,.6); }

  /* ══════════════════════════════════════
     햄버거 드로어
  ══════════════════════════════════════ */
  #drawerOverlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 9998;
    backdrop-filter: blur(2px);
  }
  #drawerOverlay.open { display: block; }

  #sideDrawer {
    position: fixed; top: 0; left: -300px; bottom: 0;
    width: 280px;
    background: var(--drawer-bg);
    border-right: 1px solid var(--drawer-border);
    z-index: 9999;
    padding: 0;
    overflow-y: auto;
    transition: left .28s cubic-bezier(.4,0,.2,1), background .25s;
    box-shadow: 4px 0 32px rgba(0,0,0,.35);
  }
  #sideDrawer.open { left: 0; }

  .drawer-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--drawer-border);
    background: var(--bg-secondary);
  }
  .drawer-logo { display: flex; align-items: center; gap: 8px; }
  .drawer-logo-box {
    background: var(--accent-blue); color: #fff;
    padding: 2px 7px; border-radius: 4px;
    font-size: 10px; font-weight: 900;
  }
  body.light .drawer-logo-box { background: #0033A0; }
  .drawer-logo-title { font-size: 12px; font-weight: 700; color: var(--drawer-text); }

  .drawer-close-btn {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px; border: 1px solid var(--drawer-border);
    background: var(--bg-card); color: var(--drawer-subtext);
    cursor: pointer; font-size: 13px; transition: all .15s;
  }
  .drawer-close-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

  .drawer-section-label {
    font-size: 9px; font-weight: 900;
    letter-spacing: .15em; color: var(--drawer-section-color);
    text-transform: uppercase;
    padding: 14px 16px 5px;
  }

  .drawer-nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 14px; margin: 1px 8px;
    border-radius: 8px;
    font-size: 13px; font-weight: 600;
    color: var(--drawer-text);
    text-decoration: none; cursor: pointer;
    border: none; background: transparent; width: calc(100% - 16px);
    text-align: left;
    transition: background .15s, color .15s;
  }
  .drawer-nav-item:hover { background: var(--drawer-item-hover); }
  .drawer-nav-item.active {
    background: var(--drawer-item-active-bg);
    color: var(--drawer-item-active-text);
  }
  .drawer-nav-icon {
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-card); border-radius: 6px;
    font-size: 13px; flex-shrink: 0;
  }
  .drawer-badge {
    margin-left: auto; font-size: 9px; font-weight: 900;
    padding: 2px 7px; border-radius: 99px;
    background: var(--bg-hover); color: var(--text-muted);
  }
  .active .drawer-badge { background: var(--accent-blue); color: #fff; }

  /* 드로어 구분선 */
  .drawer-divider {
    height: 1px; background: var(--drawer-border);
    margin: 8px 16px;
  }

  /* 드로어 하단 테마 버튼 */
  .drawer-theme-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 14px; margin: 1px 8px;
    border-radius: 8px; font-size: 13px; font-weight: 600;
    color: var(--drawer-text); cursor: pointer;
    background: var(--bg-card); border: 1px solid var(--drawer-border);
    width: calc(100% - 16px); text-align: left;
    transition: background .15s, color .15s;
  }
  .drawer-theme-btn:hover { background: var(--drawer-item-hover); border-color: var(--accent-blue); }

  /* ══════════════════════════════════════
     Period Tabs
  ══════════════════════════════════════ */
  .period-bar {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    display: flex; align-items: center; gap: 4px;
    height: 44px;
    z-index: 100; position: relative;
    transition: background .25s, border-color .25s;
  }
  .period-tab {
    padding: 6px 16px; border-radius: 6px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    color: var(--text-secondary); border: 1px solid transparent;
    background: transparent;
    transition: all .2s; white-space: nowrap;
  }
  .period-tab:hover { color: var(--text-primary); background: var(--bg-card); }
  .period-tab.active {
    color: #fff; background: var(--accent-blue);
    border-color: var(--accent-blue);
  }
  .period-label {
    margin-left: auto; font-size: 11px; color: var(--text-muted);
    padding: 4px 10px; background: var(--bg-card); border-radius: 4px;
    transition: background .25s;
  }

  /* ══════════════════════════════════════
     Main Layout
  ══════════════════════════════════════ */
  .dash-body {
    display: grid;
    grid-template-columns: 300px 1fr 280px;
    grid-template-rows: 1fr auto;
    height: calc(100vh - 96px);
    gap: 0;
  }

  /* ── Left Panel ── */
  .left-panel {
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden; z-index: 10;
    transition: background .25s, border-color .25s;
  }
  .panel-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-title {
    font-size: 12px; font-weight: 600; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: .05em;
    display: flex; align-items: center; gap: 6px;
  }
  .panel-title i { color: var(--accent-blue); font-size: 11px; }

  .briefing-cats {
    display: flex; flex-wrap: wrap; gap: 4px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  .cat-tab {
    padding: 3px 9px; border-radius: 4px;
    font-size: 11px; cursor: pointer;
    border: 1px solid var(--border);
    color: var(--text-secondary); background: var(--bg-card);
    transition: all .15s;
  }
  .cat-tab:hover { color: var(--text-primary); border-color: var(--accent-blue); }
  .cat-tab.active { color: #fff; background: var(--accent-blue); border-color: var(--accent-blue); }

  .briefing-scroll {
    flex: 1; overflow-y: auto; padding: 14px;
  }
  .briefing-scroll::-webkit-scrollbar { width: 4px; }
  .briefing-scroll::-webkit-scrollbar-track { background: transparent; }
  .briefing-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .briefing-meta {
    font-size: 10px; color: var(--text-muted);
    margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
  }
  .briefing-meta .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-teal); }

  .briefing-text { font-size: 12.5px; line-height: 1.8; color: var(--text-secondary); }
  .briefing-text b { color: var(--text-primary); font-weight: 600; }
  .briefing-text mark {
    background: rgba(79,142,247,.18); color: #93c5fd;
    border-radius: 3px; padding: 1px 3px;
  }
  .briefing-empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 200px; gap: 10px;
    color: var(--text-muted); font-size: 12px;
  }
  .briefing-empty i { font-size: 32px; opacity: .3; }

  .update-badge {
    margin: 10px 14px 0;
    padding: 6px 10px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 6px; font-size: 10px; color: var(--text-muted);
    display: flex; align-items: center; gap: 5px;
    transition: background .25s;
  }

  /* ── Center Panel ── */
  .center-panel {
    background: var(--bg-primary);
    display: flex; flex-direction: column;
    overflow: hidden; position: relative;
    transition: background .25s;
  }
  .map-container { flex: 1; position: relative; overflow: hidden; }

  #leafletMap { width: 100%; height: 100%; background: #0a1628; }

  .leaflet-tile { filter: var(--map-tile-filter); }

  .map-legend {
    position: absolute; bottom: 50px; left: 14px;
    display: flex; gap: 10px; align-items: center;
    background: rgba(15,17,23,.9);
    border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 12px;
    font-size: 10px; color: var(--text-muted); z-index: 500;
    transition: background .25s;
  }
  body.light .map-legend { background: rgba(255,255,255,.9); }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .map-filter-bar {
    padding: 8px 16px;
    background: var(--bg-secondary); border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--text-muted);
    min-height: 36px; z-index: 10;
    transition: background .25s, border-color .25s;
  }
  .filter-chip {
    display: flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 10px;
    background: var(--accent-blue); color: #fff;
    font-size: 10px; font-weight: 500; cursor: pointer;
  }
  .filter-chip i { font-size: 9px; }

  /* Leaflet 팝업 */
  .leaflet-popup-content-wrapper {
    background: var(--bg-card) !important;
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    box-shadow: 0 8px 24px rgba(0,0,0,.6) !important;
    color: var(--text-primary) !important;
  }
  .leaflet-popup-tip { background: var(--bg-card) !important; }
  .leaflet-popup-content {
    margin: 10px 14px !important;
    font-family: 'Pretendard', -apple-system, sans-serif !important;
  }
  .lf-popup-name { font-weight: 700; font-size: 13px; color: var(--text-primary); margin-bottom: 4px; }
  .lf-popup-count { font-size: 15px; font-weight: 700; color: var(--accent-blue); }
  .lf-popup-risk { font-size: 11px; margin-top: 4px; }
  .lf-popup-cats { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  /* Leaflet 줌 컨트롤 */
  .leaflet-control-zoom { border: 1px solid var(--border) !important; border-radius: 6px !important; }
  .leaflet-control-zoom a {
    background: var(--bg-card) !important;
    color: var(--text-secondary) !important;
    border-bottom: 1px solid var(--border) !important;
  }
  .leaflet-control-zoom a:hover { background: var(--bg-hover) !important; color: var(--text-primary) !important; }

  /* Leaflet attribution */
  .leaflet-control-attribution {
    background: rgba(15,17,23,.7) !important;
    color: var(--text-muted) !important; font-size: 9px !important;
  }
  .leaflet-control-attribution a { color: var(--text-muted) !important; }
  body.light .leaflet-control-attribution { background: rgba(255,255,255,.8) !important; }

  /* ── Right Panel ── */
  .right-panel {
    background: var(--bg-secondary); border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden; z-index: 10;
    transition: background .25s, border-color .25s;
  }
  .right-scroll { flex: 1; overflow-y: auto; padding: 10px; }
  .right-scroll::-webkit-scrollbar { width: 4px; }
  .right-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .cat-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px;
    margin-bottom: 8px; cursor: pointer; transition: all .2s;
  }
  .cat-card:hover { border-color: var(--accent-blue); background: var(--bg-hover); }
  .cat-card.active { border-color: var(--accent-blue); background: rgba(79,142,247,.08); }
  .cat-card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
  }
  .cat-name {
    font-size: 12px; font-weight: 600; color: var(--text-primary);
    display: flex; align-items: center; gap: 6px;
  }
  .cat-icon { font-size: 13px; }
  .cat-count { font-size: 18px; font-weight: 700; color: var(--accent-blue); line-height: 1; }
  .cat-risk-bar {
    height: 3px; border-radius: 2px; background: var(--border);
    margin: 6px 0 4px; overflow: hidden;
  }
  .cat-risk-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--accent-green), var(--accent-yellow), var(--accent-red));
    transition: width .4s ease;
  }
  .cat-top-title {
    font-size: 10px; color: var(--text-muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4;
  }
  .cat-top-risk {
    display: inline-block; font-size: 9px; font-weight: 600;
    padding: 1px 5px; border-radius: 3px; margin-right: 4px;
  }

  /* ── Bottom Articles ── */
  .bottom-panel {
    grid-column: 1 / -1;
    background: var(--bg-secondary); border-top: 1px solid var(--border);
    max-height: 240px; display: flex; flex-direction: column; z-index: 10;
    transition: background .25s, border-color .25s;
  }
  .bottom-header {
    padding: 8px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .bottom-title {
    font-size: 12px; font-weight: 600; color: var(--text-secondary);
    display: flex; align-items: center; gap: 6px;
  }
  .bottom-title i { color: var(--accent-yellow); }
  .article-count-badge {
    font-size: 10px; color: var(--text-muted);
    background: var(--bg-card); padding: 2px 8px; border-radius: 10px;
    border: 1px solid var(--border);
  }
  .articles-scroll {
    flex: 1; overflow-x: auto; overflow-y: hidden;
    display: flex; gap: 10px; padding: 10px 16px;
    scroll-snap-type: x mandatory;
  }
  .articles-scroll::-webkit-scrollbar { height: 4px; }
  .articles-scroll::-webkit-scrollbar-track { background: transparent; }
  .articles-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .article-card {
    flex-shrink: 0; width: 240px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px; cursor: pointer;
    transition: all .2s; scroll-snap-align: start;
    display: flex; flex-direction: column; gap: 5px;
    position: relative; overflow: hidden;
  }
  .article-card:hover { border-color: var(--accent-blue); transform: translateY(-1px); }
  .article-card::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 3px; height: 100%; border-radius: 2px 0 0 2px;
  }
  .article-card.risk-vh::before { background: #ef4444; }
  .article-card.risk-h::before  { background: var(--accent-orange); }
  .article-card.risk-m::before  { background: var(--accent-yellow); }

<script>
// ════════════════════════════════════════════════
// DA Intelligence Dashboard v3.1
// Leaflet 평면지도 + 햄버거 드로어 + 다크/라이트 토글
// ════════════════════════════════════════════════

// ── 테마 (기본: 다크) ──────────────────────────
let _isLight = false; // 기본 다크모드

function toggleTheme() {
  _isLight = !_isLight;
  _applyTheme();
  localStorage.setItem('da_dash_theme', _isLight ? 'light' : 'dark');
}

function _applyTheme() {
  if (_isLight) {
    document.body.classList.add('light');
  } else {
    document.body.classList.remove('light');
  }
  // 헤더 버튼 아이콘
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = _isLight ? '🌙' : '☀️';
  // 드로어 버튼
  const dIcon  = document.getElementById('drawerThemeIcon');
  const dLabel = document.getElementById('drawerThemeLabel');
  if (dIcon)  dIcon.textContent  = _isLight ? '🌙' : '☀️';
  if (dLabel) dLabel.textContent = _isLight ? '다크 모드로 전환' : '라이트 모드로 전환';
  // Leaflet 타일 필터 (CSS 변수는 자동 반영)
  if (leafletMap) {
    document.querySelectorAll('.leaflet-tile').forEach(t => {
      t.style.filter = _isLight
        ? 'brightness(1) saturate(1) hue-rotate(0deg)'
        : 'brightness(0.45) saturate(0.5) hue-rotate(190deg)';
    });
  }
}

// ── 드로어 ──────────────────────────────────────
function openDrawer() {
  document.getElementById('sideDrawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
}
function closeDrawer() {
  document.getElementById('sideDrawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
}

function setPeriodFromDrawer(p) {
  // period-tab 버튼 동기화
  const tabMap = { thisWeek:'이번 주', lastWeek:'지난 주', thisMonth:'이번 달', lastMonth:'지난 달' };
  document.querySelectorAll('.period-tab').forEach(t => {
    t.classList.toggle('active', t.textContent.trim() === tabMap[p]);
  });
  // 드로어 항목 활성화
  ['thisWeek','lastWeek','thisMonth','lastMonth'].forEach(k => {
    const el = document.getElementById('dp-' + k);
    if (el) el.classList.toggle('active', k === p);
  });
  currentPeriod = p;
  selectedRegion = null; selectedCat = null;
  updateFilterBar();
  renderAll();
  closeDrawer();
}

function _syncDrawerPeriod(p) {
  ['thisWeek','lastWeek','thisMonth','lastMonth'].forEach(k => {
    const el = document.getElementById('dp-' + k);
    if (el) el.classList.toggle('active', k === p);
  });
}

// ── 상태 ────────────────────────────────────────
let allNews = [];
let intelData = null;
let currentPeriod = 'thisWeek';
let currentBriefingCat = 'all';
let selectedRegion = null;
let selectedCat = null;
let leafletMap = null;
let markersLayer = null;

// ── 기간 계산 ────────────────────────────────────
function getPeriodRange(period) {
  const now = new Date();
  const dow = now.getDay();
  const startOfWeek = new Date(now); startOfWeek.setDate(now.getDate() - dow); startOfWeek.setHours(0,0,0,0);
  const startOfLastWeek = new Date(startOfWeek); startOfLastWeek.setDate(startOfWeek.getDate() - 7);
  const endOfLastWeek = new Date(startOfWeek); endOfLastWeek.setDate(startOfWeek.getDate() - 1);
  const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
  const startOfLastMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  const endOfLastMonth = new Date(now.getFullYear(), now.getMonth(), 0);
  return {
    thisWeek:  { start: startOfWeek,      end: now,            label: '이번 주' },
    lastWeek:  { start: startOfLastWeek,  end: endOfLastWeek,  label: '지난 주' },
    thisMonth: { start: startOfMonth,     end: now,            label: '이번 달' },
    lastMonth: { start: startOfLastMonth, end: endOfLastMonth, label: '지난 달' },
  }[period];
}

function parseDate(d) {
  if (!d) return new Date(0);
  const s = String(d).replace(/\./g,'-').replace(/\s/g,'');
  const p = s.split('T')[0].split('-');
  return p.length < 3 ? new Date(0) : new Date(p[0], p[1]-1, p[2]);
}

function filterByPeriod(news, period) {
  const { start, end } = getPeriodRange(period);
  return news.filter(n => { const d = parseDate(n.Date); return d >= start && d <= end; });
}

// ── 카테고리 ────────────────────────────────────
const CAT_ICON = { '원자재':'⛏️','거시경제':'📊','생산지역':'🏭','경쟁사':'🏢','신기술동향':'💡','신기술':'💡','AI기술':'🤖','기타':'📌' };
const CAT_COLOR = { '원자재':'#fb923c','거시경제':'#4f8ef7','생산지역':'#34d399','경쟁사':'#f87171','신기술동향':'#a78bfa','신기술':'#a78bfa','AI기술':'#2dd4bf' };
const CAT_MAIN = ['원자재','거시경제','생산지역','경쟁사','신기술동향'];

function normalizeCat(raw) {
  if (!raw) return '기타';
  const r = String(raw).split(':')[0].trim();
  if (r === '신기술' || r === 'AI기술') return '신기술동향';
  if (CAT_MAIN.includes(r)) return r;
  return '기타';
}

// ── 리스크 ──────────────────────────────────────
const RISK_SCORE = { 'Very High':4, 'High':3, 'Med':2, 'Low':1 };
function riskClass(r) {
  if (!r) return 'l';
  const s = r.toLowerCase().replace(' ','');
  if (s==='veryhigh') return 'vh'; if (s==='high') return 'h'; if (s==='med') return 'm'; return 'l';
}
function riskColor(r) {
  return ({ vh:'#ef4444', h:'#fb923c', m:'#fbbf24', l:'#34d399' })[riskClass(r)] || '#64748b';
}

// ── 지역 좌표 ────────────────────────────────────
const REGION_COORDS = {
  'South Korea': { lat:36.5,  lng:127.5,  code:'KR',  name:'한국' },
  'Korea':       { lat:36.5,  lng:127.5,  code:'KR',  name:'한국' },
  'USA':         { lat:38.0,  lng:-97.0,  code:'US',  name:'미국' },
  'United States':{ lat:38.0, lng:-97.0,  code:'US',  name:'미국' },
  'China':       { lat:35.0,  lng:105.0,  code:'CN',  name:'중국' },
  'Japan':       { lat:36.0,  lng:138.0,  code:'JP',  name:'일본' },
  'Vietnam':     { lat:16.0,  lng:107.0,  code:'VN',  name:'베트남' },
  'Poland':      { lat:52.0,  lng:20.0,   code:'PL',  name:'폴란드' },
  'Mexico':      { lat:23.0,  lng:-102.0, code:'MX',  name:'멕시코' },
  'India':       { lat:20.0,  lng:78.0,   code:'IN',  name:'인도' },
  'Brazil':      { lat:-14.0, lng:-51.0,  code:'BR',  name:'브라질' },
  'Egypt':       { lat:26.0,  lng:30.0,   code:'EG',  name:'이집트' },
  'EU':          { lat:50.0,  lng:15.0,   code:'EU',  name:'EU' },
  'SE Asia':     { lat:5.0,   lng:115.0,  code:'SEA', name:'동남아' },
  'Global':      { lat:20.0,  lng:0.0,    code:'GL',  name:'글로벌' },
  'Asia-Pacific':{ lat:30.0,  lng:130.0,  code:'AP',  name:'아시아태평양' },
  'Middle East': { lat:25.0,  lng:45.0,   code:'ME',  name:'중동' },
  'MEA':         { lat:15.0,  lng:30.0,   code:'MEA', name:'MEA' },
};

function getRegionsByCode(code) {
  return Object.entries(REGION_COORDS).filter(([,v]) => v.code === code).map(([k]) => k);
}

// ── 데이터 로드 ──────────────────────────────────
async function loadData() {
  try {
    const curKey = _curMonthKey;
    const curRes = await fetch(getNewsUrl(curKey)).then(r => r.json()).catch(() => []);
    const now = new Date();
    const prevKey = `${now.getFullYear()}-M${String(now.getMonth()).padStart(2,'0')}`;
    const prevRes = prevKey !== curKey ? await fetch(getNewsUrl(prevKey)).then(r => r.json()).catch(() => []) : [];
    allNews = [...(Array.isArray(curRes) ? curRes : []), ...(Array.isArray(prevRes) ? prevRes : [])];
    allNews.forEach((n, i) => { n._uid = `n${i}`; });
    const intelUrl = 'https://raw.githubusercontent.com/drasticlife/DA-news-hub/main/intel_report.json';
    intelData = await fetch(intelUrl).then(r => r.json()).catch(() => null);
    document.getElementById('mapLoading').style.display = 'none';
    renderAll();
  } catch(e) {
    console.error('loadData error', e);
    document.getElementById('mapLoading').style.display = 'none';
  }
}

// ── 전체 렌더 ────────────────────────────────────
function renderAll() {
  updatePeriodLabel();
  renderHeaderStats();
  renderBriefing();
  renderMapMarkers();
  renderCategoryCards();
  renderArticles();
}

function updatePeriodLabel() {
  const { start, end, label } = getPeriodRange(currentPeriod);
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  const periodNews = filterByPeriod(allNews, currentPeriod);
  document.getElementById('periodLabel').textContent = `${label} ${fmt(start)} ~ ${fmt(end)} · ${periodNews.length}건`;
}

function renderHeaderStats() {
  const periodNews = filterByPeriod(allNews, currentPeriod);
  let vh=0, h=0;
  periodNews.forEach(n => { if(n.Risk==='Very High') vh++; else if(n.Risk==='High') h++; });
  document.getElementById('headerStats').innerHTML = `
    <div class="stat-pill"><b style="color:#ef4444">${vh}</b> Very High</div>
    <div class="stat-pill"><b style="color:#fb923c">${h}</b> High</div>
    <div class="stat-pill"><b style="color:var(--accent-blue)">${periodNews.length}</b> 총 기사</div>
  `;
}

function renderBriefing() {
  const content = document.getElementById('briefingContent');
  const badge = document.getElementById('updateBadge');
  const status = document.getElementById('briefingStatus');
  if (!intelData) {
    content.innerHTML = `<div class="briefing-empty"><i class="fas fa-exclamation-circle"></i><span>브리핑 데이터 없음</span><span style="font-size:10px;color:var(--text-muted)">앵커 브리핑 생성 후 배포 필요</span></div>`;
    return;
  }
  badge.style.display = 'flex';
  document.getElementById('updateTime').textContent = '업데이트: ' + (intelData.last_updated || '-');
  const script = (intelData.scripts || {})[currentPeriod]?.[currentBriefingCat];
  if (!script) {
    content.innerHTML = `<div class="briefing-empty"><i class="fas fa-file-alt"></i><span>해당 기간/카테고리 브리핑 없음</span></div>`;
    status.textContent = '없음'; return;
  }
  status.textContent = '✓';
  const clean = script.replace(/\[[\d,\s]+\]/g,'').replace(/\*\*/g,'').replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
  const periodLabel = { thisWeek:'이번 주', lastWeek:'지난 주', thisMonth:'이번 달', lastMonth:'지난 달' }[currentPeriod];
  content.innerHTML = `
    <div class="briefing-meta"><div class="dot"></div>${periodLabel} · ${currentBriefingCat === 'all' ? '종합' : currentBriefingCat}</div>
    <div class="briefing-text">${clean}</div>`;
}

// ── Leaflet 지도 ─────────────────────────────────
function initLeafletMap() {
  if (leafletMap) return;
  leafletMap = L.map('leafletMap', { center:[25,10], zoom:2, minZoom:1, maxZoom:8, worldCopyJump:false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    subdomains: 'abc', maxZoom: 19,
  }).addTo(leafletMap);
  markersLayer = L.layerGroup().addTo(leafletMap);
  // 타일 로드 후 테마 필터 적용
  leafletMap.on('tileload', () => {
    document.querySelectorAll('.leaflet-tile').forEach(t => {
      t.style.filter = _isLight
        ? 'brightness(1) saturate(1) hue-rotate(0deg)'
        : 'brightness(0.45) saturate(0.5) hue-rotate(190deg)';
    });
  });
}

function renderMapMarkers() {
  if (!leafletMap) initLeafletMap();
  markersLayer.clearLayers();
  const periodNews = filterByPeriod(allNews, currentPeriod);
  const regionData = {};
  periodNews.forEach(n => {
    String(n.Region || n.Region_en || '').split(',').map(x => x.trim()).forEach(region => {
      const info = REGION_COORDS[region]; if (!info) return;
      const key = info.code;
      if (!regionData[key]) regionData[key] = { count:0, risks:[], cats:[], name:info.name, lat:info.lat, lng:info.lng, regions:[] };
      regionData[key].count++;
      if (n.Risk) regionData[key].risks.push(n.Risk);
      const cat = normalizeCat(n.Category);
      if (!regionData[key].cats.includes(cat)) regionData[key].cats.push(cat);
      if (!regionData[key].regions.includes(region)) regionData[key].regions.push(region);
    });
  });
  window._regionData = regionData;

  Object.entries(regionData).forEach(([code, d]) => {
    const maxRisk = d.risks.reduce((a,b) => (RISK_SCORE[b]||0) > (RISK_SCORE[a]||0) ? b : a, 'Low');
    const color = riskColor(maxRisk);
    const isSelected = selectedRegion === code;
    const radius = Math.min(8 + d.count * 2.5, 40);

    const cm = L.circleMarker([d.lat, d.lng], {
      radius, fillColor: color,
      color: isSelected ? '#fff' : color,
      weight: isSelected ? 3 : 1.5, opacity: 1,
      fillOpacity: isSelected ? 0.85 : 0.55,
    });
    cm.bindPopup(`
      <div class="lf-popup-name">${d.name}</div>
      <div class="lf-popup-count">${d.count}건</div>
      <div class="lf-popup-risk">최고 리스크: <b style="color:${color}">${maxRisk}</b></div>
      <div class="lf-popup-cats">${d.cats.join(', ')}</div>
    `, { closeButton:false, offset:[0,-5] });
    cm.on('click', () => toggleRegion(code));
    cm.on('mouseover', function(){ this.openPopup(); });
    cm.on('mouseout',  function(){ this.closePopup(); });
    markersLayer.addLayer(cm);

    if (d.count >= 3) {
      const icon = L.divIcon({
        html: `<div style="background:transparent;color:#fff;font-size:${d.count>=10?'10':'9'}px;font-weight:700;text-align:center;line-height:${radius*2}px;width:${radius*2}px;height:${radius*2}px;margin-left:-${radius}px;margin-top:-${radius}px;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,.8);">${d.count}</div>`,
        className:'', iconSize:[radius*2,radius*2], iconAnchor:[radius,radius],
      });
      markersLayer.addLayer(L.marker([d.lat, d.lng], { icon, interactive:false }));
    }
  });
}

function toggleRegion(code) {
  selectedRegion = selectedRegion === code ? null : code;
  updateFilterBar(); renderMapMarkers(); renderCategoryCards(); renderArticles();
}
function getSelectedRegionLabel() {
  const d = (window._regionData || {})[selectedRegion];
  return d ? d.name : selectedRegion;
}
function updateFilterBar() {
  const bar = document.getElementById('filterStatus');
  if (!selectedRegion) {
    bar.innerHTML = '<span style="color:var(--text-muted)">지도의 국가/마커를 클릭해 필터링하세요</span>'; return;
  }
  const name = getSelectedRegionLabel();
  bar.innerHTML = `
    <div class="filter-chip" onclick="toggleRegion('${selectedRegion}')"><i class="fas fa-times"></i> ${name} 필터 해제</div>
    <span style="color:var(--text-secondary)">${name} 관련 기사 표시 중</span>`;
}

function getFilteredNews() {
  let news = filterByPeriod(allNews, currentPeriod);
  if (selectedRegion) {
    const vr = getRegionsByCode(selectedRegion);
    news = news.filter(n => vr.some(r => String(n.Region||n.Region_en||'').includes(r)));
  }
  if (selectedCat) news = news.filter(n => normalizeCat(n.Category) === selectedCat);
  return news;
}

function renderCategoryCards() {
  let base = filterByPeriod(allNews, currentPeriod);
  if (selectedRegion) {
    const vr = getRegionsByCode(selectedRegion);
    base = base.filter(n => vr.some(r => String(n.Region||n.Region_en||'').includes(r)));
  }
  const container = document.getElementById('categoryCards');
  if (base.length === 0) { container.innerHTML = `<div class="no-data"><i class="fas fa-inbox"></i><span>해당 기간 기사 없음</span></div>`; return; }
  const catGroups = {}; CAT_MAIN.forEach(c => catGroups[c] = []);
  base.forEach(n => { const c = normalizeCat(n.Category); if (catGroups[c]) catGroups[c].push(n); });
  container.innerHTML = CAT_MAIN.map(cat => {
    const items = catGroups[cat];
    const count = items.length;
    const topItem = items.sort((a,b) => (RISK_SCORE[b.Risk]||0) - (RISK_SCORE[a.Risk]||0))[0];
    const riskRatio = items.length ? items.filter(n => n.Risk==='Very High'||n.Risk==='High').length / Math.max(items.length,1) : 0;
    const color = CAT_COLOR[cat]||'#64748b';
    return `<div class="cat-card ${selectedCat===cat?'active':''}" onclick="toggleCat('${cat}')">
      <div class="cat-card-header">
        <div class="cat-name"><span class="cat-icon">${CAT_ICON[cat]||'📌'}</span>${cat}</div>
        <div class="cat-count" style="color:${color}">${count}</div>
      </div>
      <div class="cat-risk-bar"><div class="cat-risk-fill" style="width:${Math.round(riskRatio*100)}%"></div></div>
      <div class="cat-top-title">${topItem?`<span class="cat-top-risk" style="background:${riskColor(topItem.Risk)}22;color:${riskColor(topItem.Risk)}">${topItem.Risk||'Low'}</span>${topItem.Title||''}`:'기사 없음'}</div>
    </div>`;
  }).join('');
}

function toggleCat(cat) {
  selectedCat = selectedCat === cat ? null : cat;
  renderCategoryCards(); renderArticles(); updateActiveFiltersLabel();
}
function updateActiveFiltersLabel() {
  const parts = [];
  if (selectedRegion) parts.push(getSelectedRegionLabel());
  if (selectedCat) parts.push(selectedCat);
  document.getElementById('activeFiltersLabel').textContent = parts.length ? `— ${parts.join(' · ')}` : '';
}

function renderArticles() {
  const filtered = getFilteredNews();
  const sorted = [...filtered].sort((a,b) => (RISK_SCORE[b.Risk]||0) - (RISK_SCORE[a.Risk]||0)).slice(0,30);
  document.getElementById('articleCountBadge').textContent = `${filtered.length}건`;
  updateActiveFiltersLabel();
  const container = document.getElementById('articlesContainer');
  if (sorted.length === 0) {
    container.innerHTML = `<div class="no-data" style="width:100%;justify-content:center;flex-direction:row;gap:8px"><i class="fas fa-inbox"></i><span>조건에 맞는 기사가 없습니다</span></div>`;
    return;
  }
  container.innerHTML = sorted.map(n => {
    const rc = riskClass(n.Risk);
    const cat = normalizeCat(n.Category);
    const color = CAT_COLOR[cat]||'#64748b';
    const dateStr = String(n.Date||'').replace(/T.+/,'');
    const summary = String(n.Summary||n.Summary_en||'').replace(/<[^>]+>/g,'').slice(0,80);
    // uid를 이스케이프 없이 안전하게 전달
    return `<div class="article-card risk-${rc}" onclick="openArticleModal('${n._uid}')">
      <div class="article-meta"><span class="risk-badge ${rc}">${n.Risk||'Low'}</span><span>${dateStr}</span></div>
      <div class="article-title">${n.Title||n.Title_en||'제목 없음'}</div>
      ${summary?`<div class="article-summary">${summary}...</div>`:''}
      <div class="article-footer">
        <span class="article-cat-tag" style="color:${color};background:${color}18">${cat}</span>
        <span class="article-date">${n.Region||''}</span>
      </div>
    </div>`;
  }).join('');
}

function openArticle(url) { if (url && url.startsWith('http')) window.open(url, '_blank'); }

// ── 기사 팝업 모달 ──────────────────────────────
// allNews에서 _uid로 기사 찾아 모달 오픈
function openArticleModal(uid) {
  const n = allNews.find(a => a._uid === uid);
  if (!n) return;

  // ── 히어로 이미지 ──
  const heroEl  = document.getElementById('modalHero');
  const heroImg = document.getElementById('modalHeroImg');
  heroEl.classList.remove('no-image');
  if (n.Image && n.Image.startsWith('http')) {
    heroImg.src = n.Image;
    heroImg.style.display = 'block';
  } else {
    heroEl.classList.add('no-image');
  }

  // ── 예상 읽기 시간 계산 ──
  const textLen = String(n.Summary || '').replace(/<[^>]+>/g,'').length
                + String(n.BOT || '').length;
  const readMin = Math.max(1, Math.round(textLen / 500)); // 한국어 평균 500자/분
  const readTimeEl = document.getElementById('modalReadTime');
  if (readTimeEl) readTimeEl.textContent = `약 ${readMin}분 읽기`;

  // ── 히어로 위 리스크 뱃지 ──
  const rc = riskClass(n.Risk);
  const riskLabelMap = { vh:'Very High', h:'High', m:'Medium', l:'Low' };
  const riskColorMap = { vh:'#ef4444', h:'#fb923c', m:'#f59e0b', l:'#10b981' };
  const riskBgMap    = { vh:'rgba(239,68,68,.9)', h:'rgba(251,146,60,.9)', m:'rgba(245,158,11,.9)', l:'rgba(16,185,129,.9)' };
  document.getElementById('modalHeroMeta').innerHTML = `
    <span style="padding:4px 12px;border-radius:99px;font-size:9px;font-weight:900;
      background:${riskBgMap[rc]};color:#fff;letter-spacing:.08em;
      backdrop-filter:blur(4px);text-transform:uppercase;">
      ${riskLabelMap[rc] || n.Risk || 'Low'} RISK
    </span>`;

  // ── 메타 pill 행 (카테고리 · 날짜 · 영향도) ──
  const cat = normalizeCat(n.Category);
  const catColor = CAT_COLOR[cat] || '#64748b';
  const dateStr = String(n.Date || '').replace(/T.+/, '').replace(/\./g, '-');
  document.getElementById('modalMetaRow').innerHTML = `
    <span class="modal-pill" style="color:${catColor};background:${catColor}22;border-color:${catColor}40;font-weight:800;">
      ${CAT_ICON[cat] || '📌'} ${cat}
    </span>
    <span class="modal-pill">
      <i class="fas fa-calendar-alt" style="font-size:8px;margin-right:3px;opacity:.6"></i>${dateStr}
    </span>
  `;

  // ── 제목 ──
  document.getElementById('modalTitle').textContent = n.Title || n.Title_en || '제목 없음';

  // ── 지역 태그 ──
  const regions = String(n.Region || n.Region_en || '').split(',').map(r => r.trim()).filter(Boolean);
  document.getElementById('modalRegionRow').innerHTML = regions
    .map(r => `<span class="modal-region-tag"><i class="fas fa-location-dot" style="font-size:8px;margin-right:3px"></i>${r}</span>`)
    .join('');

  // ── AI 요약 ──
  const summary = n.Summary || n.Summary_en || '요약 정보가 없습니다.';
  document.getElementById('modalSummary').innerHTML = summary;

  // ── Impact 강조 카드 ──
  const impactCard = document.getElementById('modalImpactCard');
  if (n.Impact && n.Impact.trim()) {
    const impactUp = n.Impact.includes('+') || n.Impact.toLowerCase().includes('상승') || n.Impact.toLowerCase().includes('긍정');
    impactCard.style.display = 'flex';
    impactCard.className = 'modal-impact-card';
    impactCard.innerHTML = `
      <span class="impact-icon">${impactUp ? '📈' : '📉'}</span>
      <div>
        <div class="impact-label">예상 영향도</div>
        <div class="impact-value">${n.Impact}</div>
      </div>`;
  } else {
    impactCard.style.display = 'none';
  }

  // ── AI 브리핑 (BOT) ──
  const bot = n.BOT || n['BOT(eng)'] || '';
  const botWrap = document.getElementById('modalBotWrap');
  if (bot && bot.trim()) {
    document.getElementById('modalBot').innerHTML = bot
      .replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>')   // **볼드** → <b>
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>');
    botWrap.style.display = 'block';
  } else {
    botWrap.style.display = 'none';
  }

  // ── 태그 ──
  const tags = String(n.Tag || n.Tag_en || '').split(',').map(t => t.trim()).filter(Boolean);
  const tagsWrap = document.getElementById('modalTagsWrap');
  if (tags.length > 0) {
    document.getElementById('modalTags').innerHTML = tags
      .slice(0, 12)
      .map(t => `<span class="modal-tag">#&nbsp;${t}</span>`)
      .join('');
    tagsWrap.style.display = 'block';
  } else {
    tagsWrap.style.display = 'none';
  }

  // ── 출처 카드 ──
  const rawUrls = String(n.URL || '').split('\n').map(u => u.trim()).filter(u => u.startsWith('http'));
  const sourcesEl = document.getElementById('modalSources');
  if (rawUrls.length === 0) {
    sourcesEl.innerHTML = `<div style="font-size:12px;color:rgba(255,255,255,.3);padding:12px 0;text-align:center;">출처 링크가 없습니다.</div>`;
  } else {
    const srcLabels = ['주요 출처', '2차 출처', '참고 출처'];
    sourcesEl.innerHTML = rawUrls.slice(0, 3).map((url, i) => {
      let domain = '';
      try { domain = new URL(url).hostname.replace('www.', ''); } catch(e) { domain = url; }
      const faviconUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=32`;
      const shortUrl = url.length > 65 ? url.slice(0, 65) + '…' : url;
      return `
        <a class="modal-source-card" href="${url}" target="_blank" rel="noopener noreferrer">
          <div class="source-favicon">
            <img src="${faviconUrl}" alt="${domain}" onerror="this.parentElement.textContent='🔗'">
          </div>
          <div class="source-info">
            <div class="source-label">${srcLabels[i] || `출처 ${i+1}`}</div>
            <div class="source-domain">${domain}</div>
            <div class="source-url">${shortUrl}</div>
          </div>
          <div class="source-arrow"><i class="fas fa-arrow-right" style="font-size:10px"></i></div>
        </a>`;
    }).join('');
  }

  // ── 푸터 배지 (카테고리 + 날짜) ──
  const footerBadge = document.getElementById('modalFooterBadge');
  if (footerBadge) {
    footerBadge.textContent = `${CAT_ICON[cat] || '📌'} ${cat}  ·  ${dateStr}`;
  }

  // ── 진행바 리셋 ──
  document.getElementById('readProgress').style.width = '0%';

  // ── 모달 오픈 ──
  const modal = document.getElementById('articleModal');
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';

  // 스크롤 진행 트래킹
  const bodyEl = document.getElementById('modalBody');
  bodyEl.scrollTop = 0;
  bodyEl.onscroll = () => {
    const pct = bodyEl.scrollHeight <= bodyEl.clientHeight
      ? 100
      : Math.min(100, Math.round(bodyEl.scrollTop / (bodyEl.scrollHeight - bodyEl.clientHeight) * 100));
    document.getElementById('readProgress').style.width = pct + '%';
  };
}

function closeModal() {
  document.getElementById('articleModal').classList.remove('open');
  document.body.style.overflow = '';
}

// 배경 클릭 시 닫기
function handleModalBgClick(e) {
  if (e.target === document.getElementById('articleModal')) closeModal();
}

// ESC 키로 닫기
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Period 이벤트 ────────────────────────────────
function setPeriod(p, el) {
  currentPeriod = p;
  document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  _syncDrawerPeriod(p);
  selectedRegion = null; selectedCat = null;
  updateFilterBar(); renderAll();
}

function setBriefingCat(cat, el) {
  currentBriefingCat = cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderBriefing();
}

// ── 초기화 ───────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // 저장된 테마 복원 (없으면 다크 기본)
  const saved = localStorage.getItem('da_dash_theme');
  _isLight = saved === 'light';   // 기본값 dark
  _applyTheme();

  initLeafletMap();
  loadData();
});
</script>

<script defer src="/_vercel/insights/script.js"></script>
