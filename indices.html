<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Indices Hub - SEC DA Purchase Intelligence</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2JTZ61B1PW"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-2JTZ61B1PW');
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <script>
    tailwind.config = { darkMode: "class" };
  </script>
  <link rel="stylesheet" href="assets/css/index.css" />
  <style>
    body {
      font-family: 'Pretendard', sans-serif;
    }
    .sidebar-item-active {
      background-color: #eff6ff;
      color: #0033A0;
      border-right: 4px solid #0033A0;
    }
    .content-area {
      height: calc(100vh - 3.5rem);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body class="bg-[#fcfcfc] text-[#333]">
  <header class="bg-[#0033A0] text-white sticky top-0 z-50 px-4 h-14 flex items-center justify-between shadow-xl">
    <div class="flex items-center gap-4">
      <button id="mobile-menu-btn" onclick="toggleMobileDrawer()" aria-label="메뉴 열기">
        <i data-lucide="menu" class="w-5 h-5"></i>
      </button>
      <div class="flex items-center gap-3 cursor-pointer" onclick="location.href='index.html'">
        <div class="bg-white text-[#0033A0] px-1.5 py-0.5 rounded-sm text-[10px] font-black uppercase">
          DA
        </div>
        <h1 class="font-bold text-[13px] tracking-tight uppercase whitespace-nowrap">
          Purchase Intelligence
        </h1>
      </div>
      <nav class="hidden md:flex items-center gap-3 lg:gap-4 text-[11px] font-bold whitespace-nowrap">
        <a href="index.html" class="text-white/60 hover:text-white py-1 transition-all uppercase">전략 시황</a>
        <a href="wiki/index.html" class="text-white/60 hover:text-white py-1 transition-all uppercase">WIKI</a>
        <a href="indices.html" class="text-white border-b-2 border-white py-1 transition-all uppercase">INDEX</a>
      </nav>
    </div>
    
    <div class="flex items-center gap-2">
      <button onclick="window.location.href='dashboard_mod.html'"
        class="flex items-center gap-2 bg-blue-500 hover:bg-blue-400 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest transition-all shadow-md text-white">
        <i data-lucide="layout-dashboard" class="w-3.5 h-3.5"></i> DASHBOARD
      </button>
    </div>
  </header>
    
  <!-- ============================================================
       글로벌 네비게이션 드로어 (모든 페이지 공용)
  ============================================================ -->
  <!-- 오버레이 -->
  <div id="mobile-drawer-overlay" class="fixed inset-0 bg-black/50 z-[200] hidden backdrop-blur-sm" onclick="closeMobileDrawer()"></div>

  <!-- 드로어 패널 -->
  <div id="mobile-drawer" class="fixed top-0 -left-full w-72 h-full bg-white dark:bg-[#25282c] z-[300] transition-all duration-300 shadow-2xl p-4 overflow-y-auto">
    <!-- 헤더 -->
    <div class="flex justify-between items-center mb-5 pb-4 border-b dark:border-gray-700">
      <div class="flex items-center gap-2">
        <div class="bg-[#0033A0] text-white px-1.5 py-0.5 rounded-sm text-[10px] font-black uppercase">DA</div>
        <span class="font-bold text-[13px] text-[#0033A0] dark:text-blue-400 uppercase">Purchase Intelligence</span>
      </div>
      <button onclick="closeMobileDrawer()" class="p-1 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors text-slate-500">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
    </div>

    <!-- 섹션: 페이지 이동 -->
    <div class="text-[9px] font-black tracking-[0.18em] text-slate-400 uppercase px-1 mb-2">NAVIGATE</div>
    <nav class="flex flex-col gap-1">
      <a href="index.html" class="flex items-center gap-3 p-2.5 rounded-xl text-[13px] font-bold text-slate-600 hover:bg-blue-50 hover:text-[#0033A0] transition-all">
        <span class="w-7 h-7 flex items-center justify-center bg-slate-100 rounded-lg">📰</span>
        <span class="flex-1">전략 시황 (News Hub)</span>
      </a>
      <a href="dashboard_mod.html" class="flex items-center gap-3 p-2.5 rounded-xl text-[13px] font-bold text-slate-600 hover:bg-blue-50 hover:text-[#0033A0] transition-all">
        <span class="w-7 h-7 flex items-center justify-center bg-slate-100 rounded-lg">📊</span>
        <span class="flex-1">Dashboard</span>
      </a>
      <a href="dashboard_3d.html" class="flex items-center gap-3 p-2.5 rounded-xl text-[13px] font-bold text-slate-600 hover:bg-blue-50 hover:text-[#0033A0] transition-all">
        <span class="w-7 h-7 flex items-center justify-center bg-slate-100 rounded-lg">🌐</span>
        <span class="flex-1">3D Globe Briefing</span>
      </a>
      <a href="wiki/index.html" class="flex items-center gap-3 p-2.5 rounded-xl text-[13px] font-bold text-slate-600 hover:bg-blue-50 hover:text-[#0033A0] transition-all">
        <span class="w-7 h-7 flex items-center justify-center bg-slate-100 rounded-lg">📖</span>
        <span class="flex-1">Product Wiki</span>
      </a>
      <a href="indices.html" class="flex items-center gap-3 p-2.5 rounded-xl text-[13px] font-bold bg-blue-50 text-[#0033A0] transition-all">
        <span class="w-7 h-7 flex items-center justify-center bg-blue-100 rounded-lg">📈</span>
        <span class="flex-1">Market Indices</span>
        <span class="text-[9px] font-black px-2 py-0.5 bg-slate-200 text-slate-500 rounded-full">현재</span>
      </a>
    </nav>

    <!-- 섹션: 검색 -->
    <div class="mt-6 pt-6 border-t dark:border-gray-700">
      <div class="flex items-center bg-slate-50 dark:bg-slate-800 rounded-full px-4 py-2 gap-3 border dark:border-gray-700">
        <i data-lucide="search" class="w-4 h-4 text-slate-400"></i>
        <input type="text" placeholder="키워드 검색..." onkeyup="if(event.key === 'Enter') { location.href='index.html?search=' + this.value; }"
          class="bg-transparent border-none text-xs font-bold w-full outline-none dark:text-white">
      </div>
    </div>

    <!-- 섹션: 푸터 -->
    <div class="mt-6 pt-6 border-t dark:border-gray-700 flex flex-col gap-2">
      <button onclick="location.href='index.html'" class="flex items-center gap-3 w-full p-2.5 rounded-xl text-xs font-bold text-red-500 bg-red-50 dark:bg-red-900/20 hover:bg-red-100 transition-all text-left">
        <i data-lucide="log-out" class="w-4 h-4"></i>
        <span>로그아웃 (메인 이동)</span>
      </button>
    </div>
  </div>

  <div class="flex">
    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r h-[calc(100vh-3.5rem)] sticky top-14 hidden md:block">
      <div class="p-4">
        <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 border-b pb-2">Markets</h2>
        <nav class="space-y-1">
          <button onclick="showContent('fx')" id="btn-fx" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-bold rounded-lg transition-all sidebar-item-active">
            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
            <span>환율 (FX)</span>
          </button>
          <button onclick="showContent('nonferrous')" id="btn-nonferrous" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-bold rounded-lg transition-all text-slate-600 hover:bg-slate-50">
            <i data-lucide="box" class="w-4 h-4"></i>
            <span>비철금속</span>
          </button>
        </nav>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 bg-white content-area overflow-hidden">
      <div id="content-fx" class="h-full">
        <!-- TradingView Widget BEGIN -->
        <div class="tradingview-widget-container h-full">
          <div class="tradingview-widget-container__widget h-full"></div>
          <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-forex-cross-rates.js" async>
          {
            "width": "100%",
            "height": "100%",
            "currencies": [
              "USD", "EUR", "GBP", "JPY", "CNY", "KRW", "THB", "VND", "INR", "BRL"
            ],
            "isTransparent": false,
            "colorTheme": "light",
            "locale": "kr",
            "backgroundColor": "#ffffff"
          }
          </script>
        </div>
        <!-- TradingView Widget END -->
      </div>
      
      <div id="content-nonferrous" class="h-full hidden">
        <iframe src="https://www.nonferrous.or.kr/stats/?act=sub3" class="w-full h-full border-none"></iframe>
      </div>
    </main>
  </div>

  <script>
    function showContent(type) {
      // Toggle Content
      document.getElementById('content-fx').classList.add('hidden');
      document.getElementById('content-nonferrous').classList.add('hidden');
      document.getElementById('content-' + type).classList.remove('hidden');

      // Toggle Sidebar Buttons
      document.getElementById('btn-fx').classList.remove('sidebar-item-active', 'text-slate-600');
      document.getElementById('btn-nonferrous').classList.remove('sidebar-item-active', 'text-slate-600');
      
      if (type === 'fx') {
        document.getElementById('btn-fx').classList.add('sidebar-item-active');
        document.getElementById('btn-nonferrous').classList.add('text-slate-600');
      } else {
        document.getElementById('btn-nonferrous').classList.add('sidebar-item-active');
        document.getElementById('btn-fx').classList.add('text-slate-600');
      }
    }

    /* ===== 글로벌 네비게이션 드로어 제어 (Mobile Menu) ===== */
    function toggleMobileDrawer() {
      const drawer = document.getElementById('mobile-drawer');
      const overlay = document.getElementById('mobile-drawer-overlay');
      const isOpen = drawer.style.left === '0px';

      if (isOpen) {
        closeMobileDrawer();
      } else {
        drawer.style.left = '0px';
        overlay.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
      }
    }

    function closeMobileDrawer() {
      const drawer = document.getElementById('mobile-drawer');
      const overlay = document.getElementById('mobile-drawer-overlay');
      drawer.style.left = '-100%';
      overlay.classList.add('hidden');
      document.body.style.overflow = '';
    }

    // Initialize Lucide Icons
    lucide.createIcons();
  </script>
</body>
</html>
