name: 📈 Update LME Prices

on:
  # 매일 오전 9시 (KST) = 자정 UTC, 평일만
  schedule:
    - cron: '0 0 * * 1-5'

  # 수동 실행도 가능 (전체 이력 수집 포함)
  workflow_dispatch:
    inputs:
      full_fetch:
        description: '전체 이력 수집 (290페이지, 최초 1회용)'
        required: false
        type: boolean
        default: false

jobs:
  update-lme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run LME scraper
        run: |
          if [ "${{ github.event.inputs.full_fetch }}" = "true" ]; then
            echo "🕐 전체 이력 수집 시작..."
            python scripts/crawl_lme.py --full
          else
            echo "📅 일일 업데이트 시작..."
            python scripts/crawl_lme.py
          fi

      - name: Commit and push if data changed
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add data/lme_prices.json
          if git diff --staged --quiet; then
            echo "📭 변경 없음 — 커밋 건너뜀"
          else
            git commit -m "🤖 Update LME prices - $(TZ='Asia/Seoul' date +'%Y-%m-%d')"
            git push
            echo "✅ data/lme_prices.json 업데이트 완료"
          fi
