<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DA Intelligence Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
<!-- Leaflet.js -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg-primary: #0f1117;
    --bg-secondary: #1a1d27;
    --bg-card: #1e2130;
    --bg-hover: #252840;
    --accent-blue: #4f8ef7;
    --accent-teal: #2dd4bf;
    --accent-red: #f87171;
    --accent-orange: #fb923c;
    --accent-yellow: #fbbf24;
    --accent-green: #34d399;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --border: #2d3148;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Pretendard', 'Apple SD Gothic Neo', -apple-system, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .dash-header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 1000;
  }
  .dash-header .logo {
    display: flex; align-items: center; gap: 10px;
    font-size: 15px; font-weight: 700; color: var(--text-primary);
    text-decoration: none;
  }
  .dash-header .logo span { color: var(--accent-blue); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 6px;
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-secondary); font-size: 12px; cursor: pointer;
    text-decoration: none; transition: all .2s;
  }
  .back-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

  /* ── Period Tabs ── */
  .period-bar {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 4px;
    height: 44px;
    z-index: 999;
    position: relative;
  }
  .period-tab {
    padding: 6px 16px; border-radius: 6px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    color: var(--text-secondary); border: 1px solid transparent;
    transition: all .2s; white-space: nowrap;
  }
  .period-tab:hover { color: var(--text-primary); background: var(--bg-card); }
  .period-tab.active {
    color: #fff; background: var(--accent-blue);
    border-color: var(--accent-blue);
  }
  .period-label {
    margin-left: auto; font-size: 11px; color: var(--text-muted);
    padding: 4px 10px; background: var(--bg-card); border-radius: 4px;
  }

  /* ── Main Layout ── */
  .dash-body {
    display: grid;
    grid-template-columns: 300px 1fr 280px;
    grid-template-rows: 1fr auto;
    height: calc(100vh - 96px);
    gap: 0;
  }

  /* ── Left Panel ── */
  .left-panel {
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
    z-index: 10;
  }
  .panel-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-title {
    font-size: 12px; font-weight: 600; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: .05em;
    display: flex; align-items: center; gap: 6px;
  }
  .panel-title i { color: var(--accent-blue); font-size: 11px; }

  /* 브리핑 카테고리 탭 */
  .briefing-cats {
    display: flex; flex-wrap: wrap; gap: 4px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  .cat-tab {
    padding: 3px 9px; border-radius: 4px;
    font-size: 11px; cursor: pointer;
    border: 1px solid var(--border);
    color: var(--text-secondary); background: var(--bg-card);
    transition: all .15s;
  }
  .cat-tab:hover { color: var(--text-primary); border-color: var(--accent-blue); }
  .cat-tab.active { color: #fff; background: var(--accent-blue); border-color: var(--accent-blue); }

  /* 브리핑 스크롤 영역 */
  .briefing-scroll {
    flex: 1; overflow-y: auto; padding: 14px;
  }
  .briefing-scroll::-webkit-scrollbar { width: 4px; }
  .briefing-scroll::-webkit-scrollbar-track { background: transparent; }
  .briefing-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .briefing-meta {
    font-size: 10px; color: var(--text-muted);
    margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
  }
  .briefing-meta .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-teal); }

  .briefing-text {
    font-size: 12.5px; line-height: 1.8; color: var(--text-secondary);
  }
  .briefing-text b { color: var(--text-primary); font-weight: 600; }
  .briefing-text mark {
    background: rgba(79,142,247,.18);
    color: #93c5fd;
    border-radius: 3px;
    padding: 1px 3px;
  }
  .briefing-empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 200px; gap: 10px;
    color: var(--text-muted); font-size: 12px;
  }
  .briefing-empty i { font-size: 32px; opacity: .3; }

  /* 업데이트 시각 */
  .update-badge {
    margin: 10px 14px 0;
    padding: 6px 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 10px; color: var(--text-muted);
    display: flex; align-items: center; gap: 5px;
  }

  /* ── Center Panel ── */
  .center-panel {
    background: var(--bg-primary);
    display: flex; flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .map-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  /* Leaflet 지도 */
  #leafletMap {
    width: 100%;
    height: 100%;
    background: #0a1628;
  }

  /* Leaflet 타일 다크 필터 */
  .leaflet-tile {
    filter: brightness(0.45) saturate(0.5) hue-rotate(190deg);
  }

  /* 지도 범례 */
  .map-legend {
    position: absolute; bottom: 50px; left: 14px;
    display: flex; gap: 10px; align-items: center;
    background: rgba(15,17,23,.9);
    border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 12px;
    font-size: 10px; color: var(--text-muted);
    z-index: 500;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* 지도 필터 상태 */
  .map-filter-bar {
    padding: 8px 16px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--text-muted);
    min-height: 36px;
    z-index: 10;
  }
  .filter-chip {
    display: flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 10px;
    background: var(--accent-blue); color: #fff;
    font-size: 10px; font-weight: 500;
    cursor: pointer;
  }
  .filter-chip i { font-size: 9px; }

  /* Leaflet 커스텀 팝업 */
  .leaflet-popup-content-wrapper {
    background: var(--bg-card) !important;
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    box-shadow: 0 8px 24px rgba(0,0,0,.6) !important;
    color: var(--text-primary) !important;
  }
  .leaflet-popup-tip {
    background: var(--bg-card) !important;
  }
  .leaflet-popup-content {
    margin: 10px 14px !important;
    font-family: 'Pretendard', -apple-system, sans-serif !important;
  }
  .lf-popup-name { font-weight: 700; font-size: 13px; color: var(--text-primary); margin-bottom: 4px; }
  .lf-popup-count { font-size: 15px; font-weight: 700; color: var(--accent-blue); }
  .lf-popup-risk { font-size: 11px; margin-top: 4px; }
  .lf-popup-cats { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  /* Leaflet 줌 컨트롤 */
  .leaflet-control-zoom {
    border: 1px solid var(--border) !important;
    border-radius: 6px !important;
  }
  .leaflet-control-zoom a {
    background: var(--bg-card) !important;
    color: var(--text-secondary) !important;
    border-bottom: 1px solid var(--border) !important;
  }
  .leaflet-control-zoom a:hover {
    background: var(--bg-hover) !important;
    color: var(--text-primary) !important;
  }

  /* ── Right Panel ── */
  .right-panel {
    background: var(--bg-secondary);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
    z-index: 10;
  }
  .right-scroll { flex: 1; overflow-y: auto; padding: 10px; }
  .right-scroll::-webkit-scrollbar { width: 4px; }
  .right-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* 카테고리 카드 */
  .cat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all .2s;
  }
  .cat-card:hover { border-color: var(--accent-blue); background: var(--bg-hover); }
  .cat-card.active { border-color: var(--accent-blue); background: rgba(79,142,247,.08); }
  .cat-card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
  }
  .cat-name {
    font-size: 12px; font-weight: 600; color: var(--text-primary);
    display: flex; align-items: center; gap: 6px;
  }
  .cat-icon { font-size: 13px; }
  .cat-count {
    font-size: 18px; font-weight: 700; color: var(--accent-blue);
    line-height: 1;
  }
  .cat-risk-bar {
    height: 3px; border-radius: 2px;
    background: var(--border);
    margin: 6px 0 4px;
    overflow: hidden;
  }
  .cat-risk-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--accent-green), var(--accent-yellow), var(--accent-red));
    transition: width .4s ease;
  }
  .cat-top-title {
    font-size: 10px; color: var(--text-muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    line-height: 1.4;
  }
  .cat-top-risk {
    display: inline-block; font-size: 9px; font-weight: 600;
    padding: 1px 5px; border-radius: 3px; margin-right: 4px;
  }

  /* ── Bottom Articles ── */
  .bottom-panel {
    grid-column: 1 / -1;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    max-height: 240px;
    display: flex; flex-direction: column;
    z-index: 10;
  }
  .bottom-header {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .bottom-title {
    font-size: 12px; font-weight: 600; color: var(--text-secondary);
    display: flex; align-items: center; gap: 6px;
  }
  .bottom-title i { color: var(--accent-yellow); }
  .article-count-badge {
    font-size: 10px; color: var(--text-muted);
    background: var(--bg-card); padding: 2px 8px; border-radius: 10px;
    border: 1px solid var(--border);
  }
  .articles-scroll {
    flex: 1; overflow-x: auto; overflow-y: hidden;
    display: flex; gap: 10px; padding: 10px 16px;
    scroll-snap-type: x mandatory;
  }
  .articles-scroll::-webkit-scrollbar { height: 4px; }
  .articles-scroll::-webkit-scrollbar-track { background: transparent; }
  .articles-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* 기사 카드 */
  .article-card {
    flex-shrink: 0;
    width: 240px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all .2s;
    scroll-snap-align: start;
    display: flex; flex-direction: column; gap: 5px;
    position: relative;
    overflow: hidden;
  }
  .article-card:hover { border-color: var(--accent-blue); transform: translateY(-1px); }
  .article-card::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 3px; height: 100%; border-radius: 2px 0 0 2px;
  }
  .article-card.risk-vh::before { background: #ef4444; }
  .article-card.risk-h::before { background: var(--accent-orange); }
  .article-card.risk-m::before { background: var(--accent-yellow); }
  .article-card.risk-l::before { background: var(--accent-green); }

  .article-meta {
    display: flex; align-items: center; gap: 5px;
    font-size: 9px; color: var(--text-muted);
  }
  .risk-badge {
    display: inline-flex; align-items: center;
    padding: 1px 5px; border-radius: 3px;
    font-size: 9px; font-weight: 700;
    text-transform: uppercase;
  }
  .risk-badge.vh { background: rgba(239,68,68,.15); color: #f87171; }
  .risk-badge.h  { background: rgba(251,146,60,.15); color: #fb923c; }
  .risk-badge.m  { background: rgba(251,191,36,.15); color: #fbbf24; }
  .risk-badge.l  { background: rgba(52,211,153,.15); color: #34d399; }

  .article-title {
    font-size: 12px; font-weight: 600; color: var(--text-primary);
    line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .article-summary {
    font-size: 10px; color: var(--text-muted);
    line-height: 1.6;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .article-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: auto;
  }
  .article-cat-tag {
    font-size: 9px; color: var(--accent-teal);
    background: rgba(45,212,191,.1); padding: 1px 6px; border-radius: 3px;
  }
  .article-date { font-size: 9px; color: var(--text-muted); }

  /* ── Stats strip ── */
  .stats-strip {
    display: flex; align-items: center; gap: 6px;
    padding: 0 16px;
  }
  .stat-pill {
    display: flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 4px;
    background: var(--bg-card); border: 1px solid var(--border);
    font-size: 10px; color: var(--text-muted);
  }
  .stat-pill b { color: var(--text-primary); font-weight: 600; }

  /* ── Loading / Empty ── */
  .loading-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-primary);
    flex-direction: column; gap: 12px;
    z-index: 50;
  }
  .spin {
    width: 32px; height: 32px; border-radius: 50%;
    border: 3px solid var(--border);
    border-top-color: var(--accent-blue);
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Scrollbar global ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── No data ── */
  .no-data {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 30px;
    color: var(--text-muted); gap: 8px; font-size: 12px;
  }
  .no-data i { font-size: 28px; opacity: .3; }

  /* Leaflet 기본 attribution 숨김 처리 */
  .leaflet-control-attribution {
    background: rgba(15,17,23,.7) !important;
    color: var(--text-muted) !important;
    font-size: 9px !important;
  }
  .leaflet-control-attribution a { color: var(--text-muted) !important; }
</style>
</head>
<body>

<!-- Header -->
<header class="dash-header">
  <a href="index.html" class="logo">
    <i class="fas fa-shield-alt" style="color:var(--accent-blue)"></i>
    DA <span>Intelligence</span> Dashboard
  </a>
  <div class="header-right">
    <div class="stats-strip" id="headerStats"></div>
    <a href="index.html" class="back-btn">
      <i class="fas fa-newspaper"></i> News Hub
    </a>
  </div>
</header>

<!-- Period Tabs -->
<div class="period-bar">
  <button class="period-tab active" onclick="setPeriod('thisWeek',this)">이번 주</button>
  <button class="period-tab" onclick="setPeriod('lastWeek',this)">지난 주</button>
  <button class="period-tab" onclick="setPeriod('thisMonth',this)">이번 달</button>
  <button class="period-tab" onclick="setPeriod('lastMonth',this)">지난 달</button>
  <div class="period-label" id="periodLabel">로딩 중...</div>
</div>

<!-- Main Body -->
<div class="dash-body">

  <!-- LEFT: AI 브리핑 -->
  <div class="left-panel">
    <div class="panel-header">
      <div class="panel-title">
        <i class="fas fa-robot"></i> AI 브리핑
      </div>
      <div id="briefingStatus" style="font-size:10px;color:var(--text-muted)"></div>
    </div>
    <!-- 카테고리 탭 -->
    <div class="briefing-cats" id="briefingCats">
      <button class="cat-tab active" data-cat="all" onclick="setBriefingCat('all',this)">종합</button>
      <button class="cat-tab" data-cat="원자재" onclick="setBriefingCat('원자재',this)">원자재</button>
      <button class="cat-tab" data-cat="거시경제" onclick="setBriefingCat('거시경제',this)">거시경제</button>
      <button class="cat-tab" data-cat="생산지역" onclick="setBriefingCat('생산지역',this)">생산지역</button>
      <button class="cat-tab" data-cat="경쟁사" onclick="setBriefingCat('경쟁사',this)">경쟁사</button>
      <button class="cat-tab" data-cat="신기술동향" onclick="setBriefingCat('신기술동향',this)">신기술</button>
    </div>
    <div id="updateBadge" class="update-badge" style="display:none">
      <i class="fas fa-clock" style="color:var(--accent-teal)"></i>
      <span id="updateTime"></span>
    </div>
    <div class="briefing-scroll" id="briefingContent">
      <div class="briefing-empty">
        <i class="fas fa-brain"></i>
        <span>브리핑 로딩 중...</span>
      </div>
    </div>
  </div>

  <!-- CENTER: Leaflet 세계지도 -->
  <div class="center-panel">
    <div class="loading-overlay" id="mapLoading">
      <div class="spin"></div>
      <span style="font-size:12px;color:var(--text-muted)">데이터 로딩 중...</span>
    </div>
    <div class="map-container" id="mapContainer">
      <div id="leafletMap"></div>
      <!-- 지도 범례 -->
      <div class="map-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> Very High</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent-orange)"></div> High</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent-yellow)"></div> Med</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent-green)"></div> Low</div>
        <div class="legend-item"><div class="legend-dot" style="background:#3b6ea8"></div> 기사 있음</div>
      </div>
    </div>
    <div class="map-filter-bar" id="mapFilterBar">
      <i class="fas fa-map-marker-alt" style="color:var(--text-muted)"></i>
      <span id="filterStatus" style="color:var(--text-muted)">지도의 국가/마커를 클릭해 필터링하세요</span>
    </div>
  </div>

  <!-- RIGHT: 카테고리별 이슈 -->
  <div class="right-panel">
    <div class="panel-header">
      <div class="panel-title">
        <i class="fas fa-chart-bar"></i> 카테고리별 이슈
      </div>
    </div>
    <div class="right-scroll" id="categoryCards">
      <div class="no-data"><i class="fas fa-spinner fa-spin"></i><span>로딩 중...</span></div>
    </div>
  </div>

  <!-- BOTTOM: 핵심 기사 -->
  <div class="bottom-panel">
    <div class="bottom-header">
      <div class="bottom-title">
        <i class="fas fa-bolt"></i>
        핵심 기사
        <span id="activeFiltersLabel" style="font-size:10px;color:var(--text-muted);margin-left:4px"></span>
      </div>
      <span class="article-count-badge" id="articleCountBadge">0건</span>
    </div>
    <div class="articles-scroll" id="articlesContainer">
      <div class="no-data" style="width:100%;justify-content:center">
        <i class="fas fa-newspaper"></i><span>기사를 불러오는 중...</span>
      </div>
    </div>
  </div>

</div>

<script src="assets/js/config.js"></script>
<script>
// ════════════════════════════════════════════════
// DA Intelligence Dashboard v3.0
// Leaflet.js 평면 세계지도 + AI 브리핑 + 카테고리 패널
// ════════════════════════════════════════════════

// ── 상태 ──
let allNews = [];
let intelData = null;
let currentPeriod = 'thisWeek';
let currentBriefingCat = 'all';
let selectedRegion = null;   // 국가 코드 (예: 'KR', 'US')
let selectedCat = null;
let leafletMap = null;
let markersLayer = null;

// ── 기간 날짜 계산 ──
function getPeriodRange(period) {
  const now = new Date();
  const dow = now.getDay();
  const startOfWeek = new Date(now); startOfWeek.setDate(now.getDate() - dow); startOfWeek.setHours(0,0,0,0);
  const startOfLastWeek = new Date(startOfWeek); startOfLastWeek.setDate(startOfWeek.getDate() - 7);
  const endOfLastWeek = new Date(startOfWeek); endOfLastWeek.setDate(startOfWeek.getDate() - 1);
  const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
  const startOfLastMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  const endOfLastMonth = new Date(now.getFullYear(), now.getMonth(), 0);
  const map = {
    thisWeek:  { start: startOfWeek,     end: now,           label: '이번 주' },
    lastWeek:  { start: startOfLastWeek, end: endOfLastWeek, label: '지난 주' },
    thisMonth: { start: startOfMonth,    end: now,           label: '이번 달' },
    lastMonth: { start: startOfLastMonth,end: endOfLastMonth,label: '지난 달' },
  };
  return map[period];
}

function parseDate(d) {
  if (!d) return new Date(0);
  const s = String(d).replace(/\./g,'-').replace(/\s/g,'');
  const p = s.split('T')[0].split('-');
  return p.length < 3 ? new Date(0) : new Date(p[0], p[1]-1, p[2]);
}

function filterByPeriod(news, period) {
  const { start, end } = getPeriodRange(period);
  return news.filter(n => { const d = parseDate(n.Date); return d >= start && d <= end; });
}

// ── 카테고리 정규화 ──
const CAT_ICON = {
  '원자재': '⛏️', '거시경제': '📊', '생산지역': '🏭',
  '경쟁사': '🏢', '신기술동향': '💡', '신기술': '💡', 'AI기술': '🤖', '기타': '📌'
};
const CAT_COLOR = {
  '원자재': '#fb923c', '거시경제': '#4f8ef7', '생산지역': '#34d399',
  '경쟁사': '#f87171', '신기술동향': '#a78bfa', '신기술': '#a78bfa', 'AI기술': '#2dd4bf'
};
const CAT_MAIN = ['원자재','거시경제','생산지역','경쟁사','신기술동향'];

function normalizeCat(raw) {
  if (!raw) return '기타';
  const r = String(raw).split(':')[0].trim();
  if (r === '신기술' || r === 'AI기술') return '신기술동향';
  if (CAT_MAIN.includes(r)) return r;
  return '기타';
}

// ── 리스크 ──
const RISK_SCORE = { 'Very High': 4, 'High': 3, 'Med': 2, 'Low': 1 };
function riskClass(r) {
  if (!r) return 'l';
  const s = r.toLowerCase().replace(' ','');
  if (s === 'veryhigh') return 'vh';
  if (s === 'high') return 'h';
  if (s === 'med') return 'm';
  return 'l';
}
function riskColor(r) {
  const c = { vh:'#ef4444', h:'#fb923c', m:'#fbbf24', l:'#34d399' };
  return c[riskClass(r)] || '#64748b';
}

// ── 지역 → 좌표 & 국가 코드 ──
const REGION_COORDS = {
  'South Korea': { lat: 36.5, lng: 127.5, code: 'KR', name: '한국' },
  'Korea':       { lat: 36.5, lng: 127.5, code: 'KR', name: '한국' },
  'USA':         { lat: 38.0, lng: -97.0, code: 'US', name: '미국' },
  'United States': { lat: 38.0, lng: -97.0, code: 'US', name: '미국' },
  'China':       { lat: 35.0, lng: 105.0, code: 'CN', name: '중국' },
  'Japan':       { lat: 36.0, lng: 138.0, code: 'JP', name: '일본' },
  'Vietnam':     { lat: 16.0, lng: 107.0, code: 'VN', name: '베트남' },
  'Poland':      { lat: 52.0, lng: 20.0,  code: 'PL', name: '폴란드' },
  'Mexico':      { lat: 23.0, lng: -102.0,code: 'MX', name: '멕시코' },
  'India':       { lat: 20.0, lng: 78.0,  code: 'IN', name: '인도' },
  'Brazil':      { lat: -14.0, lng: -51.0,code: 'BR', name: '브라질' },
  'Egypt':       { lat: 26.0, lng: 30.0,  code: 'EG', name: '이집트' },
  'EU':          { lat: 50.0, lng: 15.0,  code: 'EU', name: 'EU' },
  'SE Asia':     { lat: 5.0,  lng: 115.0, code: 'SEA',name: '동남아' },
  'Global':      { lat: 20.0, lng: 0.0,   code: 'GL', name: '글로벌' },
  'Asia-Pacific':{ lat: 30.0, lng: 130.0, code: 'AP', name: '아시아태평양' },
  'Middle East': { lat: 25.0, lng: 45.0,  code: 'ME', name: '중동' },
  'MEA':         { lat: 15.0, lng: 30.0,  code: 'MEA',name: 'MEA' },
};

// 국가 코드 역매핑 (코드 → 지역명 배열)
function getRegionsByCode(code) {
  return Object.entries(REGION_COORDS)
    .filter(([, v]) => v.code === code)
    .map(([k]) => k);
}

// ── 데이터 로드 ──
async function loadData() {
  try {
    const curKey = _curMonthKey;
    const curRes = await fetch(getNewsUrl(curKey)).then(r => r.json()).catch(() => []);

    const now = new Date();
    const prevKey = `${now.getFullYear()}-M${String(now.getMonth()).padStart(2,'0')}`;
    const prevRes = prevKey !== curKey
      ? await fetch(getNewsUrl(prevKey)).then(r => r.json()).catch(() => [])
      : [];

    allNews = [...(Array.isArray(curRes) ? curRes : []), ...(Array.isArray(prevRes) ? prevRes : [])];
    allNews.forEach((n, i) => { n._uid = `n${i}`; });

    const intelUrl = 'https://raw.githubusercontent.com/drasticlife/DA-news-hub/main/intel_report.json';
    intelData = await fetch(intelUrl).then(r => r.json()).catch(() => null);

    document.getElementById('mapLoading').style.display = 'none';
    renderAll();
  } catch(e) {
    console.error('loadData error', e);
    document.getElementById('mapLoading').style.display = 'none';
  }
}

// ── 전체 렌더 ──
function renderAll() {
  updatePeriodLabel();
  renderHeaderStats();
  renderBriefing();
  renderMapMarkers();
  renderCategoryCards();
  renderArticles();
}

// ── 기간 라벨 ──
function updatePeriodLabel() {
  const { start, end, label } = getPeriodRange(currentPeriod);
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  const periodNews = filterByPeriod(allNews, currentPeriod);
  document.getElementById('periodLabel').textContent =
    `${label} ${fmt(start)} ~ ${fmt(end)} · ${periodNews.length}건`;
}

// ── 헤더 통계 ──
function renderHeaderStats() {
  const periodNews = filterByPeriod(allNews, currentPeriod);
  let vh=0, h=0;
  periodNews.forEach(n => {
    if(n.Risk==='Very High') vh++;
    else if(n.Risk==='High') h++;
  });
  document.getElementById('headerStats').innerHTML = `
    <div class="stat-pill"><b style="color:#ef4444">${vh}</b> Very High</div>
    <div class="stat-pill"><b style="color:#fb923c">${h}</b> High</div>
    <div class="stat-pill"><b style="color:var(--accent-blue)">${periodNews.length}</b> 총 기사</div>
  `;
}

// ── AI 브리핑 ──
function renderBriefing() {
  const content = document.getElementById('briefingContent');
  const badge = document.getElementById('updateBadge');
  const status = document.getElementById('briefingStatus');

  if (!intelData) {
    content.innerHTML = `<div class="briefing-empty">
      <i class="fas fa-exclamation-circle"></i>
      <span>브리핑 데이터가 없습니다</span>
      <span style="font-size:10px;color:var(--text-muted)">앵커 브리핑 생성 후 GitHub 배포 필요</span>
    </div>`;
    return;
  }

  badge.style.display = 'flex';
  document.getElementById('updateTime').textContent = '업데이트: ' + (intelData.last_updated || '-');

  const scripts = intelData.scripts || {};
  const periodScripts = scripts[currentPeriod] || {};
  const script = periodScripts[currentBriefingCat];

  if (!script) {
    content.innerHTML = `<div class="briefing-empty">
      <i class="fas fa-file-alt"></i>
      <span>해당 기간/카테고리 브리핑 없음</span>
      <span style="font-size:10px;color:var(--text-muted)">앵커 브리핑 재생성 후 배포하세요</span>
    </div>`;
    status.textContent = '없음';
    return;
  }

  status.textContent = '✓';
  const clean = script
    .replace(/\[[\d,\s]+\]/g, '')
    .replace(/\*\*/g, '')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');

  content.innerHTML = `
    <div class="briefing-meta">
      <div class="dot"></div>
      ${currentPeriod === 'thisWeek' ? '이번 주' : currentPeriod === 'lastWeek' ? '지난 주' : currentPeriod === 'thisMonth' ? '이번 달' : '지난 달'}
      ·
      ${currentBriefingCat === 'all' ? '종합' : currentBriefingCat}
    </div>
    <div class="briefing-text">${clean}</div>
  `;
}

// ── Leaflet 지도 초기화 ──
function initLeafletMap() {
  if (leafletMap) return;

  leafletMap = L.map('leafletMap', {
    center: [25, 10],
    zoom: 2,
    minZoom: 1,
    maxZoom: 8,
    zoomControl: true,
    attributionControl: true,
    worldCopyJump: false,
  });

  // OpenStreetMap 타일 (다크 필터 CSS 적용)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    subdomains: 'abc',
    maxZoom: 19,
  }).addTo(leafletMap);

  markersLayer = L.layerGroup().addTo(leafletMap);
}

// ── 마커 렌더 ──
function renderMapMarkers() {
  if (!leafletMap) initLeafletMap();
  markersLayer.clearLayers();

  const periodNews = filterByPeriod(allNews, currentPeriod);

  // 지역별 집계
  const regionData = {};
  periodNews.forEach(n => {
    const r = String(n.Region || n.Region_en || '');
    r.split(',').map(x => x.trim()).forEach(region => {
      const info = REGION_COORDS[region];
      if (!info) return;
      const key = info.code;
      if (!regionData[key]) {
        regionData[key] = { count: 0, risks: [], cats: [], name: info.name, lat: info.lat, lng: info.lng, regions: [] };
      }
      regionData[key].count++;
      if (n.Risk) regionData[key].risks.push(n.Risk);
      const cat = normalizeCat(n.Category);
      if (!regionData[key].cats.includes(cat)) regionData[key].cats.push(cat);
      if (!regionData[key].regions.includes(region)) regionData[key].regions.push(region);
    });
  });

  window._regionData = regionData;

  // 마커 생성
  Object.entries(regionData).forEach(([code, d]) => {
    const maxRisk = d.risks.reduce((a, b) => (RISK_SCORE[b]||0) > (RISK_SCORE[a]||0) ? b : a, 'Low');
    const color = riskColor(maxRisk);
    const isSelected = selectedRegion === code;

    // 버블 크기
    const radius = Math.min(8 + d.count * 2.5, 40);

    const circleMarker = L.circleMarker([d.lat, d.lng], {
      radius: radius,
      fillColor: color,
      color: isSelected ? '#fff' : color,
      weight: isSelected ? 3 : 1.5,
      opacity: 1,
      fillOpacity: isSelected ? 0.85 : 0.55,
    });

    // 팝업
    const riskLabel = { vh: 'Very High', h: 'High', m: 'Med', l: 'Low' };
    const rc = riskClass(maxRisk);
    circleMarker.bindPopup(`
      <div class="lf-popup-name">${d.name}</div>
      <div class="lf-popup-count">${d.count}건</div>
      <div class="lf-popup-risk">최고 리스크: <b style="color:${color}">${maxRisk}</b></div>
      <div class="lf-popup-cats">${d.cats.join(', ')}</div>
    `, { closeButton: false, offset: [0, -5] });

    circleMarker.on('click', () => {
      toggleRegion(code);
    });

    circleMarker.on('mouseover', function() { this.openPopup(); });
    circleMarker.on('mouseout', function() { this.closePopup(); });

    markersLayer.addLayer(circleMarker);

    // 카운트 레이블 (5건 이상)
    if (d.count >= 3) {
      const icon = L.divIcon({
        html: `<div style="
          background:transparent;
          color:#fff;
          font-size:${d.count >= 10 ? '10' : '9'}px;
          font-weight:700;
          text-align:center;
          line-height:${radius*2}px;
          width:${radius*2}px;
          height:${radius*2}px;
          margin-left:-${radius}px;
          margin-top:-${radius}px;
          pointer-events:none;
          text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        ">${d.count}</div>`,
        className: '',
        iconSize: [radius*2, radius*2],
        iconAnchor: [radius, radius],
      });
      const labelMarker = L.marker([d.lat, d.lng], { icon, interactive: false });
      markersLayer.addLayer(labelMarker);
    }
  });
}

// ── 지역 선택/해제 ──
function toggleRegion(code) {
  if (selectedRegion === code) {
    selectedRegion = null;
  } else {
    selectedRegion = code;
  }
  updateFilterBar();
  renderMapMarkers();
  renderCategoryCards();
  renderArticles();
}

function getSelectedRegionLabel() {
  if (!selectedRegion) return null;
  const d = (window._regionData || {})[selectedRegion];
  return d ? d.name : selectedRegion;
}

function updateFilterBar() {
  const bar = document.getElementById('filterStatus');
  if (!selectedRegion) {
    bar.innerHTML = '<span style="color:var(--text-muted)">지도의 국가/마커를 클릭해 필터링하세요</span>';
    return;
  }
  const name = getSelectedRegionLabel();
  bar.innerHTML = `
    <div class="filter-chip" onclick="toggleRegion('${selectedRegion}')">
      <i class="fas fa-times"></i> ${name} 필터 해제
    </div>
    <span style="color:var(--text-secondary)">${name} 관련 기사 표시 중</span>
  `;
}

// ── 필터된 뉴스 ──
function getFilteredNews() {
  let news = filterByPeriod(allNews, currentPeriod);
  if (selectedRegion) {
    const validRegions = getRegionsByCode(selectedRegion);
    news = news.filter(n => {
      const r = String(n.Region || n.Region_en || '');
      return validRegions.some(vr => r.includes(vr));
    });
  }
  if (selectedCat) {
    news = news.filter(n => normalizeCat(n.Category) === selectedCat);
  }
  return news;
}

// ── 카테고리 카드 ──
function renderCategoryCards() {
  const periodNews = filterByPeriod(allNews, currentPeriod);
  let base = periodNews;
  if (selectedRegion) {
    const validRegions = getRegionsByCode(selectedRegion);
    base = base.filter(n => {
      const r = String(n.Region || n.Region_en || '');
      return validRegions.some(vr => r.includes(vr));
    });
  }

  const container = document.getElementById('categoryCards');
  if (base.length === 0) {
    container.innerHTML = `<div class="no-data"><i class="fas fa-inbox"></i><span>해당 기간 기사 없음</span></div>`;
    return;
  }

  const catGroups = {};
  CAT_MAIN.forEach(c => catGroups[c] = []);
  base.forEach(n => {
    const c = normalizeCat(n.Category);
    if (catGroups[c]) catGroups[c].push(n);
  });

  container.innerHTML = CAT_MAIN.map(cat => {
    const items = catGroups[cat];
    const count = items.length;
    const topItem = items.sort((a,b) => (RISK_SCORE[b.Risk]||0) - (RISK_SCORE[a.Risk]||0))[0];
    const riskRatio = items.length > 0
      ? items.filter(n => n.Risk === 'Very High' || n.Risk === 'High').length / Math.max(items.length, 1)
      : 0;
    const color = CAT_COLOR[cat] || '#64748b';
    const icon = CAT_ICON[cat] || '📌';
    const isActive = selectedCat === cat;

    return `<div class="cat-card ${isActive ? 'active' : ''}" onclick="toggleCat('${cat}')">
      <div class="cat-card-header">
        <div class="cat-name">
          <span class="cat-icon">${icon}</span>
          ${cat}
        </div>
        <div class="cat-count" style="color:${color}">${count}</div>
      </div>
      <div class="cat-risk-bar">
        <div class="cat-risk-fill" style="width:${Math.round(riskRatio*100)}%"></div>
      </div>
      <div class="cat-top-title">
        ${topItem ? `<span class="cat-top-risk" style="background:${riskColor(topItem.Risk)}22;color:${riskColor(topItem.Risk)}">${topItem.Risk||'Low'}</span>${topItem.Title||''}` : '기사 없음'}
      </div>
    </div>`;
  }).join('');
}

function toggleCat(cat) {
  selectedCat = selectedCat === cat ? null : cat;
  renderCategoryCards();
  renderArticles();
  updateActiveFiltersLabel();
}

function updateActiveFiltersLabel() {
  const parts = [];
  if (selectedRegion) parts.push(getSelectedRegionLabel());
  if (selectedCat) parts.push(selectedCat);
  document.getElementById('activeFiltersLabel').textContent = parts.length ? `— ${parts.join(' · ')}` : '';
}

// ── 기사 카드 ──
function renderArticles() {
  const filtered = getFilteredNews();
  const sorted = filtered.sort((a,b) => (RISK_SCORE[b.Risk]||0) - (RISK_SCORE[a.Risk]||0)).slice(0,30);
  document.getElementById('articleCountBadge').textContent = `${filtered.length}건`;
  updateActiveFiltersLabel();

  const container = document.getElementById('articlesContainer');
  if (sorted.length === 0) {
    container.innerHTML = `<div class="no-data" style="width:100%;justify-content:center;flex-direction:row;gap:8px"><i class="fas fa-inbox"></i><span>조건에 맞는 기사가 없습니다</span></div>`;
    return;
  }

  container.innerHTML = sorted.map(n => {
    const rc = riskClass(n.Risk);
    const cat = normalizeCat(n.Category);
    const color = CAT_COLOR[cat] || '#64748b';
    const dateStr = String(n.Date||'').replace(/T.+/,'');
    const summary = String(n.Summary||n.Summary_en||'').replace(/<[^>]+>/g,'').slice(0,80);

    return `<div class="article-card risk-${rc}" onclick="openArticle('${(n.URL||'').split('\n')[0].trim()}')">
      <div class="article-meta">
        <span class="risk-badge ${rc}">${n.Risk||'Low'}</span>
        <span>${dateStr}</span>
      </div>
      <div class="article-title">${n.Title||n.Title_en||'제목 없음'}</div>
      ${summary ? `<div class="article-summary">${summary}...</div>` : ''}
      <div class="article-footer">
        <span class="article-cat-tag" style="color:${color};background:${color}18">${cat}</span>
        <span class="article-date">${n.Region||''}</span>
      </div>
    </div>`;
  }).join('');
}

function openArticle(url) {
  if (url && url.startsWith('http')) window.open(url, '_blank');
}

// ── 이벤트 핸들러 ──
function setPeriod(p, el) {
  currentPeriod = p;
  document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  selectedRegion = null; selectedCat = null;
  updateFilterBar();
  renderAll();
}

function setBriefingCat(cat, el) {
  currentBriefingCat = cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderBriefing();
}

// ── 초기화 ──
document.addEventListener('DOMContentLoaded', () => {
  initLeafletMap();
  loadData();
});
</script>
</body>
</html>
